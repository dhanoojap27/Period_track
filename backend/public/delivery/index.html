<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Partner Portal | Delivery</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
</head>
<body>
    <!-- Login Screen -->
    <div id="login-screen" class="screen">
        <div class="login-card">
            <div class="brand">
                <i class="fas fa-box-open"></i>
                <h1>Partner Portal</h1>
                <p>Period Tracker Delivery</p>
            </div>
            <form id="login-form">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="login-email" required placeholder="driver@example.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="login-password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-primary">Login</button>
                <p id="login-error" class="error-text"></p>
            </form>
        </div>
    </div>

    <!-- Dashboard Screen -->
    <div id="dashboard-screen" class="screen hidden">
        <header>
            <div class="header-content">
                <div class="partner-info">
                    <h2 id="partner-name">Welcome!</h2>
                    <p id="partner-vehicle"></p>
                </div>
                <button id="logout-btn" class="btn-icon"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </header>

        <main>
            <div class="tabs">
                <button class="tab-btn active" data-tab="active">Active Orders</button>
                <button class="tab-btn" data-tab="history">History</button>
            </div>

            <div id="active-tab" class="tab-content">
                <div id="active-orders-list" class="orders-list">
                    <!-- Orders will be injected here -->
                    <div class="loading">Loading assignments...</div>
                </div>
            </div>

            <div id="history-tab" class="tab-content hidden">
                <div id="history-orders-list" class="orders-list">
                    <div class="loading">Loading history...</div>
                </div>
            </div>
        </main>

        <button id="refresh-btn" class="fab"><i class="fas fa-sync-alt"></i></button>
    </div>

    <!-- Status Update Modal -->
    <div id="status-modal" class="modal hidden">
        <div class="modal-content">
            <h3>Update Status</h3>
            <p id="modal-order-number"></p>
            
            <div class="status-options">
                <button class="status-btn" data-status="picked_up" onclick="selectStatus(this)">
                    <i class="fas fa-box"></i>
                    <span>Picked Up</span>
                </button>
                <button class="status-btn" data-status="in_transit" onclick="selectStatus(this)">
                    <i class="fas fa-truck-loading"></i>
                    <span>Out for Delivery</span>
                </button>
                <button class="status-btn" data-status="delivered" onclick="selectStatus(this)">
                    <i class="fas fa-check-double"></i>
                    <span>Mark Delivered</span>
                </button>
            </div>

            <div class="form-group">
                <label>Add Notes (optional)</label>
                <textarea id="status-notes" rows="2"></textarea>
            </div>

            <div class="modal-actions">
                <button id="close-modal" class="btn btn-secondary">Cancel</button>
                <button id="confirm-status" class="btn btn-primary">Update</button>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
